name: Build Echo Sync Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (without wrapper)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Generate Gradle Wrapper files
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :echosync:assembleRelease

      - name: Rename APK to .eapk
        run: |
          mkdir -p output
          cp echosync/build/outputs/apk/release/echosync-release.apk output/echo-sync-extension-${{ github.ref_name }}.eapk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.eapk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}