name: Build Echo Sync Extension

on:
  push:
    tags:
      - 'v*'               # v1.0.0, v2.1.3 등 SemVer 태그 푸시 시 실행
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 릴리즈 생성 및 업로드 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :echosync:assembleRelease

      - name: Rename APK to .eapk
        run: |
          mkdir -p output
          cp echosync/build/outputs/apk/release/echosync-release.apk output/echo-sync-extension-${{ github.ref_name }}.eapk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.eapk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}